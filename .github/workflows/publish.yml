name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing version $VERSION"
          npm version "$VERSION" --no-git-tag-version --workspaces --include-workspace-root

      - run: npm run build
      - run: npm test

      - name: Publish packages
        run: |
          for pkg in packages/core packages/wasm packages/web packages/markdown-it packages/rehype; do
            npm publish "./$pkg" --provenance --access public
          done
