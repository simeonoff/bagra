<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theme Switcher</title>

  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --primary: #0f3460;
      --accent: #e94560;
      --text: #eee;
      --radius: 0.5rem;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: grid;
      place-items: center;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--primary);
      border-radius: var(--radius);
      padding: 2rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 32px rgb(0 0 0 / 30%);
    }

    .card h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .card p {
      color: rgb(255 255 255 / 60%);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
    }

    .btn {
      padding: 0.625rem 1.25rem;
      border: none;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 150ms ease, transform 100ms ease;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn--primary {
      background: var(--accent);
      color: white;
    }

    .btn--ghost {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .btn--ghost:hover {
      background: rgb(233 69 96 / 10%);
    }

    .counter {
      font-variant-numeric: tabular-nums;
      font-size: 3rem;
      font-weight: 700;
      text-align: center;
      padding: 1rem 0;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8f9fa;
        --surface: #ffffff;
        --primary: #dee2e6;
        --text: #212529;
      }
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      animation: fade-in 400ms ease-out;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>Interactive Counter</h1>
    <p>A simple component demonstrating HTML with injected CSS and JavaScript highlighting.</p>

    <div class="counter" id="count">0</div>

    <div class="actions">
      <button class="btn btn--primary" id="increment">Increment</button>
      <button class="btn btn--ghost" id="decrement">Decrement</button>
      <button class="btn btn--ghost" id="reset">Reset</button>
    </div>
  </main>

  <script>
    const counter = document.getElementById('count');
    const incrementBtn = document.getElementById('increment');
    const decrementBtn = document.getElementById('decrement');
    const resetBtn = document.getElementById('reset');

    let count = 0;
    const MAX = 99;
    const MIN = -99;

    function update() {
      counter.textContent = count;
      incrementBtn.disabled = count >= MAX;
      decrementBtn.disabled = count <= MIN;
    }

    incrementBtn.addEventListener('click', () => {
      if (count < MAX) {
        count++;
        update();
      }
    });

    decrementBtn.addEventListener('click', () => {
      if (count > MIN) {
        count--;
        update();
      }
    });

    resetBtn.addEventListener('click', () => {
      count = 0;
      update();
    });

    // Initialize button states
    update();
  </script>
</body>
</html>
